spring.application.name=ai-study-planner
server.port=8081

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/study_planner_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
# Let Spring Boot detect the driver and dialect automatically based on the URL

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Use a generic dialect or let Hibernate detect it
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Security
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000

# AI API Key (Hugging Face)
huggingface.api.key=${HUGGINGFACE_API_KEY}

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
